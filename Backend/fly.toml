app = "thinwallet-backend"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[checks]]
  name = "alive"
  port = 8080
  type = "tcp"
  interval = "30s"
  timeout = "10s"
  grace_period = "360s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
