# Application
spring.application.name=thinwallet

# Perfil activo: SQL (relacional) + MongoDB (NoSQL) corren simultáneamente
spring.profiles.active=sql

# Server
server.port=8080

# MySQL Database (relacional)
spring.datasource.url=jdbc:mysql://100.87.26.105:3306/thinwallet_db
spring.datasource.username=ThinWallet
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MongoDB (NoSQL) - siempre activo junto con SQL
spring.data.mongodb.uri=mongodb://hernando:ClaveHernando123@100.124.143.126:27017/gestion_gastos_audit?authSource=admin
spring.data.mongodb.database=gestion_gastos_audit
spring.data.mongodb.auto-index-creation=false

# Habilita beans condicionales de MongoDB (notificaciones, actividad, indicadores)
mongodb.enabled=true

# Jackson — fechas como ISO-8601, no como arrays de números
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Logging
logging.level.co.edu.unbosque=DEBUG

