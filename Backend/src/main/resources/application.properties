# Application
spring.application.name=thinwallet

# Perfil activo: SQL (relacional) + MongoDB (NoSQL) corren simultáneamente
spring.profiles.active=sql

# Server
server.port=8080

# MySQL Database (relacional)
# Configura las variables de entorno: MYSQL_URL, MYSQL_USERNAME, MYSQL_PASSWORD
spring.datasource.url=${MYSQL_URL:jdbc:mysql://100.87.26.105:3306/thinwallet_db?allowMultiQueries=true&allowLoadLocalInfileInPath=&allowLocalInfile=false&allowUrlInLocalInfile=false&allowLoadLocalInfileInPath=false&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximumPoolSize=15
spring.datasource.hikari.minimumIdle=3
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.leakDetectionThreshold=60000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# MongoDB (NoSQL) - siempre activo junto con SQL
# Configura la variable de entorno: MONGODB_URI
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:thinwallet_db}
spring.data.mongodb.auto-index-creation=false

# Firebase Cloud Messaging — push notifications
# Configura las variables de entorno: FIREBASE_ENABLED, FIREBASE_SERVICE_ACCOUNT_BASE64
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}

# Jackson — fechas como ISO-8601, no como arrays de números
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Logging — INFO en producción para no exponer datos sensibles en logs
logging.level.co.edu.unbosque=INFO

# Mail Configuration
# Configura las variables de entorno: MAIL_USERNAME, MAIL_PASSWORD
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# RNF-01 — Clave maestra para AES-256-GCM
# Configura la variable de entorno: THINWALLET_CIPHER_MASTER_KEY
thinwallet.cipher.master-key=${THINWALLET_CIPHER_MASTER_KEY}

# RNF-13 — Rate limiting por IP (peticiones/minuto)
thinwallet.rate-limit.enabled=true
thinwallet.rate-limit.requests-per-minute=120

# CORS — orígenes permitidos (separados por coma)
# Configura la variable de entorno: CORS_ALLOWED_ORIGINS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT — autenticación sin estado
# Configura la variable de entorno: JWT_SECRET (mínimo 32 caracteres)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
