# ── Perfil MongoDB (NoSQL) ────────────────────────────────────────────────────
# Para activar: cambiar spring.profiles.active=mongo en application.properties
# y rellenar la URI de tu instancia MongoDB.

# URI de conexión — reemplaza con tu cadena real:
#   Local:   mongodb://localhost:27017/thinwallet_db
#   Atlas:   mongodb+srv://<usuario>:<password>@<cluster>.mongodb.net/thinwallet_db
spring.data.mongodb.uri=mongodb://localhost:27017/thinwallet_db
spring.data.mongodb.database=thinwallet_db
spring.data.mongodb.auto-index-creation=true

# Cuando uses MongoDB puro puedes deshabilitar JPA para no cargar el datasource MySQL:
# spring.autoconfigure.exclude=\
#   org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
#   org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
