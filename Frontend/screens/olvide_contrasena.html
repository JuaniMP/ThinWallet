<span class="material-symbols-outlined text-primary" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-lowest border-2 border-primary py-4 pl-12 pr-4 font-body focus:bg-surface-container-high focus:outline-none transition-colors placeholder:text-outline-variant" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<!-- Primary Action Button -->
<div class="pt-2">

</button>
</div>
